<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus VC | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; overflow: hidden; }
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: radial-gradient(circle at 20% 30%, #1e3a8a 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, #581c87 0%, transparent 40%);
            filter: blur(80px); opacity: 0.5; animation: mesh-float 20s ease-in-out infinite alternate;
        }
        @keyframes mesh-float { 0% { transform: scale(1); } 100% { transform: scale(1.2) rotate(5deg); } }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-mesh"></div>
    <div class="glass-card p-10 rounded-[2.5rem] w-full max-w-md relative overflow-hidden group">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
        <div class="flex justify-center mb-8">
            <div class="bg-blue-600 p-3 rounded-2xl rotate-3 group-hover:rotate-0 transition-transform duration-500 shadow-lg shadow-blue-500/20">
                <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
            </div>
        </div>
        <h1 class="text-3xl font-extrabold text-white text-center mb-2 tracking-tighter">Nexus Intelligence</h1>
        <p class="text-slate-400 text-center mb-8 text-sm">Enter the capital ecosystem</p>
        
        <form method="POST" action="/" class="space-y-5">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Identity</label>
                <input type="text" name="username" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600" placeholder="Username">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Access Key</label>
                <input type="password" name="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-blue-400 transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-2">
                <span>Authorize Session</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
