<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DreamLaunch | Investor Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root { --accent: #8d6e63; --bg: #fdfaf5; --glass: rgba(255, 255, 255, 0.8); --text: #3e2723; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(141, 110, 99, 0.2); border-radius: 20px; box-shadow: 0 10px 30px rgba(62, 39, 35, 0.05); transition: 0.3s ease; }
        .glass-panel:hover { transform: translateY(-5px); border-color: var(--accent); }
        .sidebar { width: 340px; height: 100vh; position: sticky; top: 0; padding: 2rem; border-right: 1px solid rgba(141, 110, 99, 0.1); }
        .main-content { flex-grow: 1; padding: 4rem; }
        .status-Stable { color: #2e7d32; } .status-Warning { color: #f9a825; } .status-Critical { color: #c62828; }
        .btn-memo { background: var(--accent); color: #fff; font-weight: 600; border-radius: 50px; padding: 12px 25px; border: none; }
        .advanced-info { display: none; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed rgba(141, 110, 99, 0.2); }
        .advanced-active .advanced-info { display: block; }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="d-flex">
    <div class="sidebar d-flex flex-column">
        <h2 class="fw-bold mb-5" style="color: var(--accent)">DreamLaunch<span style="color: #000">.</span></h2>
        <div class="glass-panel p-3 mb-4">
            <canvas id="radarChart"></canvas>
        </div>
        <div class="form-check form-switch mb-5">
            <input class="form-check-input" type="checkbox" id="modeToggle" onchange="toggleMode()">
            <label class="form-check-label ms-2 small fw-bold">ANALYST MODE</label>
        </div>
        <div class="mt-auto">
            <a href="/download-memo/{{ pitch.id }}" class="btn btn-memo w-100 shadow">Download VC Memo</a>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-end mb-5">
            <div>
                <h6 class="text-uppercase tracking-widest opacity-50 small mb-2">Audit Session #{{ pitch.id }}</h6>
                <h1 class="display-5 fw-bold">Intelligence Suite</h1>
            </div>
            <div class="text-end">
                <h1 class="display-3 fw-bold mb-0" id="globalScore">--</h1>
                <p class="small text-uppercase opacity-50">Global Fit Index</p>
            </div>
        </div>

        <div id="grid" class="row g-4"></div>
    </div>
</div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-bg'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for(let i=0; i<4000; i++) starPos.push((Math.random()-0.5)*1500, (Math.random()-0.5)*1500, (Math.random()-0.5)*1500);
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x8d6e63, size: 2 }));
    scene.add(stars);
    camera.position.z = 500;
    function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.0003; renderer.render(scene, camera); }
    animate();

    function toggleMode() { document.body.classList.toggle('advanced-active'); }

    async function load() {
        const res = await fetch(`/api/full-analysis/{{ pitch.id }}`);
        const data = await res.json();
        const grid = document.getElementById('grid');
        let total = 0;
        Object.entries(data).forEach(([key, val]) => {
            total += val.score;
            const col = document.createElement('div');
            col.className = "col-md-6 col-xl-4 module-item";
            col.innerHTML = `
                <div class="glass-panel p-4 h-100">
                    <div class="d-flex justify-content-between mb-3">
                        <span class="status-${val.status} small fw-bold">● ${val.status}</span>
                        <span class="fw-bold opacity-50">${val.score}%</span>
                    </div>
                    <h6 class="text-uppercase small fw-bold mb-2">${key.replace('_',' ')}</h6>
                    <p class="small mb-0 opacity-75">${val.summary}</p>
                    <div class="advanced-info">
                        ${Object.entries(val.details).map(([k,v]) => `<div class='small d-flex justify-content-between mb-1'><span>${k}:</span><b>${v}</b></div>`).join('')}
                        <div class='mt-3'>
                            <label class='small fw-bold opacity-50 d-block'>ACTIONS</label>
                            ${val.actions.map(a => `<div class='small'>• ${a}</div>`).join('')}
                        </div>
                    </div>
                </div>`;
            grid.appendChild(col);
        });
        document.getElementById('globalScore').innerText = Math.round(total/12) + "%";
        renderRadar(data);
        anime({ targets: '.module-item', translateY: [30, 0], opacity: [0, 1], delay: anime.stagger(80), easing: 'easeOutExpo' });
    }

    function renderRadar(data) {
        const labels = Object.keys(data).slice(0, 6);
        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: {
                labels: labels.map(l => l.toUpperCase()),
                datasets: [{ data: labels.map(l => data[l].score), backgroundColor: 'rgba(141, 110, 99, 0.1)', borderColor: '#8d6e63', borderWidth: 1 }]
            },
            options: { scales: { r: { grid: { color: 'rgba(141, 110, 99, 0.1)' }, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });
    }
    load();
</script>
</body>
</html>
